# =============================================================================
# Alertmanager → Telegram Bridge — Service
# =============================================================================
# Internal ClusterIP service. Alertmanager sends webhooks here:
#   http://alertmanager-telegram-bot.monitoring.svc.cluster.local:8080/alerts
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-telegram-bot
  namespace: monitoring
  labels:
    app: alertmanager-telegram-bot
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: alertmanager-telegram-bot
