apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "home-assistant.fullname" . }}-config
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
data:
  configuration.yaml: |
    # Home Assistant Core Configuration
    # See https://www.home-assistant.io/docs/configuration/

    homeassistant:
      name: {{ .Values.config.name | quote }}
      latitude: {{ .Values.config.latitude }}
      longitude: {{ .Values.config.longitude }}
      elevation: {{ .Values.config.elevation }}
      unit_system: {{ .Values.config.unitSystem }}
      time_zone: {{ .Values.config.timezone }}
      {{- if .Values.config.internalUrl }}
      internal_url: {{ .Values.config.internalUrl | quote }}
      {{- end }}

    # Enable Prometheus metrics endpoint
    prometheus:

    # Trusted proxies for reverse proxy (Traefik)
    http:
      use_x_forwarded_for: true
      trusted_proxies:
{{- range .Values.config.trustedProxies }}
        - {{ . }}
{{- end }}

    # Default config
    default_config:
