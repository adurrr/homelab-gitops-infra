{{- if .Values.ingress.enabled }}
# =============================================================================
# Traefik Middleware: increased timeouts for Home Assistant
# =============================================================================
# Home Assistant backup/restore operations can take several minutes for
# large files. Default Traefik timeout (30s) would kill the connection.
# This middleware removes buffering size limits and extends timeouts.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "home-assistant.fullname" . }}-long-timeout
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  buffering:
    maxRequestBodyBytes: 0
    maxResponseBodyBytes: 0
{{- end }}
