# =============================================================================
# Homelab GitOps Infrastructure: Grafana Loki Datasource
# =============================================================================
# Provisions Loki as a Grafana datasource for log exploration.
# The Grafana sidecar auto-discovers ConfigMaps with label:
#   grafana_datasource: "1"
# in the monitoring namespace.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: false
