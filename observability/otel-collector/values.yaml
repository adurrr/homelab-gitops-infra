# =============================================================================
# Homelab GitOps Infrastructure: OpenTelemetry Collector Values
# =============================================================================
# Single-instance OTel Collector receiving OTLP, enriching with K8s metadata,
# and exporting metrics to Prometheus + logs/traces to Loki.
# Reference: https://github.com/open-telemetry/opentelemetry-helm-charts
# Chart version: 0.156.2 (app 0.152.0)
#
# NOTE: These values are for reference/local testing only.
# The actual deployment values are in platform/argocd/apps/otel-collector.yaml
# =============================================================================

image:
  repository: otel/opentelemetry-collector-contrib

mode: deployment  # Single instance for homelab

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 10s
      send_batch_size: 1024
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.deployment.name
          - k8s.cluster.uid
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: connection

  exporters:
    # Metrics → Prometheus remote write
    prometheusremotewrite:
      endpoint: http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write
      resource_to_telemetry_conversion:
        enabled: true
    # Logs → Loki via OTLP
    otlphttp/loki:
      endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
      tls:
        insecure: true

  extensions:
    # Health check endpoint for readiness/liveness probes
    health_check:
      endpoint: 0.0.0.0:13133
    # Pprof endpoint for debugging
    pprof:
      endpoint: 0.0.0.0:1777

  service:
    extensions:
      - health_check
      - pprof
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [otlphttp/loki]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [otlphttp/loki]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "watch", "list"]
    - apiGroups: [""]
      resources: ["services", "endpoints"]
      verbs: ["get", "watch", "list"]
    - apiGroups: ["apps"]
      resources: ["replicasets"]
      verbs: ["get", "watch", "list"]
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["list", "watch"]

# Enable health check port
ports:
  healthcheck:
    enabled: true
    containerPort: 13133
    servicePort: 13133
    protocol: TCP
  pprof:
    enabled: true
    containerPort: 1777
    servicePort: 1777
    protocol: TCP

# Liveness and readiness probes using health_check extension
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  httpGet:
    port: 13133
    path: /

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  httpGet:
    port: 13133
    path: /
