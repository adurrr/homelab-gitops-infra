name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when a new commit is pushed.
# Saves CI minutes on rapid pushes to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default timeout for all jobs (can be overridden per-job)
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  helm-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Lint every chart under apps/. If we add a new chart directory, it gets
    # linted automatically. Add explicit skip patterns to exclude anything
    # that isn't a real chart.
    strategy:
      fail-fast: false
      matrix:
        chart:
          - apps/home-assistant
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm chart (${{ matrix.chart }})
        run: helm lint ${{ matrix.chart }}/

  tofu-validate:
    # OpenTofu (Terraform-compatible) validation. AGENTS.md requires
    # `tofu validate` before proposing infrastructure changes.
    # Only runs when files in proxmox/ or infra/ change.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: tofu init (proxmox/opentofu)
        working-directory: proxmox/opentofu
        run: tofu init -backend=false

      - name: tofu validate
        working-directory: proxmox/opentofu
        run: tofu validate

      - name: tofu fmt -check (formatting)
        working-directory: proxmox/opentofu
        run: tofu fmt -check -recursive

  yamllint-all:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        # Pinned to v2.0.0 — the @master reference was a supply-chain risk
        # (any force-push to master would silently change behavior).
        # v2.0.0 is the latest tagged release as of writing.
        uses: ludeeus/action-shellcheck@v2.0.0
        with:
          severity: warning
