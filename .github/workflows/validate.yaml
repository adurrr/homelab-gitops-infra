name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when a new commit is pushed.
# Saves CI minutes on rapid pushes to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: only read repo contents. No step writes, so we
# do not need contents: write or any other elevated scope.
permissions:
  contents: read

# Single source of truth for linting is the `lint` job below, which runs
# the full pre-commit suite defined in .pre-commit-config.yaml. The hooks
# (yamllint, shellcheck, gitleaks, check-yaml, check-json, end-of-file,
# trailing-whitespace, large-files, merge-conflict, private-key) cover
# what the old yamllint-all and shellcheck jobs did — keeping them as
# separate jobs would duplicate work and risk config drift.
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  helm-lint:
    # Discover every chart with a Chart.yaml and lint it. Adding a new
    # chart directory auto-gets linted without editing this file.
    # Linting sequentially (not matrix) because the homelab has only
    # a handful of charts; matrix parallelism buys little here and a
    # single failure path is easier to read in CI logs.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint all Helm charts
        run: |
          set +e  # collect all failures, do not stop at first
          charts=$(find . -name Chart.yaml \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -exec dirname {} \;)
          if [ -z "$charts" ]; then
            echo "No Helm charts with Chart.yaml found"
            exit 0
          fi
          chart_count=$(printf '%s\n' "$charts" | wc -l)
          echo "Found $chart_count Helm chart(s):"
          printf '  - %s\n' $charts
          echo ""
          fail=0
          for chart in $charts; do
            echo "::group::helm lint $chart"
            helm lint "$chart"
            rc=$?
            echo "::endgroup::"
            if [ $rc -ne 0 ]; then
              fail=1
            fi
          done
          exit $fail

  tofu-validate:
    # OpenTofu (Terraform-compatible) validation. AGENTS.md requires
    # `tofu validate` before proposing infrastructure changes.
    # Skipped unless files under proxmox/, infra/, or this workflow change.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 needed for paths-filter to compare against base
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: some
          filters: |
            tofu:
              - 'proxmox/**'
              - 'infra/**'
              - '.github/workflows/validate.yaml'

      - name: Skip notice
        if: steps.filter.outputs.tofu != 'true'
        run: |
          echo "No changes under proxmox/ or infra/ and no workflow change — skipping tofu validate."

      - name: Set up OpenTofu
        if: steps.filter.outputs.tofu == 'true'
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: tofu init (proxmox/opentofu)
        if: steps.filter.outputs.tofu == 'true'
        working-directory: proxmox/opentofu
        run: tofu init -backend=false

      - name: tofu validate
        if: steps.filter.outputs.tofu == 'true'
        working-directory: proxmox/opentofu
        run: tofu validate

      - name: tofu fmt -check (formatting)
        if: steps.filter.outputs.tofu == 'true'
        working-directory: proxmox/opentofu
        run: tofu fmt -check -recursive
