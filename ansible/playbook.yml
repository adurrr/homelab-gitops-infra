---
# =============================================================================
# Homelab GitOps Infrastructure: Main Playbook
# =============================================================================
# Bootstraps all nodes with required tools and kernel configuration.
#
# Usage:
#   # Dry run (check mode: no changes made)
#   ansible-playbook -i ansible/inventory.yml ansible/playbook.yml --check
#
#   # Full run
#   ansible-playbook -i ansible/inventory.yml ansible/playbook.yml
#
#   # Run on servers only
#   ansible-playbook -i ansible/inventory.yml ansible/playbook.yml --limit servers
#
#   # Run on agents only
#   ansible-playbook -i ansible/inventory.yml ansible/playbook.yml --limit agents
# =============================================================================

- name: Bootstrap homelab nodes
  hosts: k3s
  become: true
  gather_facts: true

  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Validate Ansible version
      ansible.builtin.assert:
        that:
          - ansible_version.major >= 2
          - ansible_version.minor >= 14
        fail_msg: >-
          Ansible >= 2.14 is required. Current version: {{ ansible_version.string }}

    - name: Display target information
      ansible.builtin.debug:
        msg: |
          Bootstrapping node: {{ inventory_hostname }}
          Architecture: {{ ansible_architecture }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Kernel: {{ ansible_kernel }}
          Memory: {{ ansible_memtotal_mb }} MB
          CPUs: {{ ansible_processor_vcpus }}

  roles:
    - role: bootstrap-node
      tags: [bootstrap, kernel]

    - role: install-kubectl
      tags: [kubectl, tools]

    - role: install-helm
      tags: [helm, tools]

  post_tasks:
    - name: Verify kubectl is installed
      ansible.builtin.command: kubectl version --client --output=json
      changed_when: false
      register: kubectl_check

    - name: Verify helm is installed
      ansible.builtin.command: helm version --short
      changed_when: false
      register: helm_check

    - name: Display bootstrap summary
      ansible.builtin.debug:
        msg: |
          Bootstrap complete for {{ inventory_hostname }}
          Architecture: {{ ansible_architecture }} (Go arch: {{ architecture_map[ansible_architecture] }})
          kubectl: {{ kubectl_check.stdout | default('not found') }}
          helm: {{ helm_check.stdout | default('not found') }}
