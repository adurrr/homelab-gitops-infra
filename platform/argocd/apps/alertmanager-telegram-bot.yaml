# =============================================================================
# Homelab GitOps Infrastructure: Alertmanager Telegram Bridge Application
# =============================================================================
# Deploys a lightweight Python bridge that translates Alertmanager webhook
# payloads into Telegram messages via the Bot API.
# Managed by the "observability" AppProject.
#
# Sync wave 1: deploys after prometheus (wave 0) which sets up Alertmanager.
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alertmanager-telegram-bot
  namespace: argocd
  finalizers:
    - resources-finalizer.argoproj.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: observability
  source:
    path: apps/alertmanager-telegram-bot
    repoURL: https://github.com/adurrr/homelab-gitops-infra
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
