# =============================================================================
# Homelab GitOps Infrastructure: ntfy Application
# =============================================================================
# Deploys ntfy: self-hosted HTTP-based push notification service.
# Replaces the RocketChat placeholder in Alertmanager config.
#
# Architecture: single Go binary, no external dependencies. Alertmanager
# posts to http://ntfy.ntfy.svc.cluster.local/prometheus-alerts via webhook.
# Phone subscribes to the prometheus-alerts topic via the ntfy app.
#
# Resource: ~50MB RAM, ~10m CPU — negligible.
#
# Telegram remains as secondary/fallback channel (continue: true on critical).
#
# Chart source: oci://ghcr.io/helmforgedev/helm (HelmForge, v1.1.0,
# actively maintained, uses binwiederhier/ntfy upstream image).
# Previous source (nicholaswilde/helm-charts) was unmaintained and
# failed ArgoCD repo-server fetch with "error fetch" ComparisonError.
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ntfy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    namespace: ntfy
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: ghcr.io/helmforgedev/charts
    chart: ntfy
    targetRevision: 1.1.0
    helm:
      values: |
        image:
          repository: docker.io/binwiederhier/ntfy
          tag: "v2.24.0"
          pullPolicy: IfNotPresent

        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi

        persistence:
          enabled: true
          size: 1Gi
          storageClass: local-path

        ingress:
          enabled: true
          ingressClassName: traefik
          hosts:
            - host: ntfy.homelab.local
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - ntfy.homelab.local
              secretName: ntfy-tls

        ntfy:
          extraEnv:
            - name: NTFY_BASE_URL
              value: "https://ntfy.homelab.local"
            - name: NTFY_BEHIND_PROXY
              value: "true"
            - name: NTFY_AUTH_DEFAULT_ACCESS
              value: "deny-all"
            - name: NTFY_ENABLE_SIGNUP
              value: "false"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
