# =============================================================================
# Homelab GitOps Infrastructure: MetalLB Configuration Application
# =============================================================================
# IP Pool and L2 Advertisement: applied AFTER MetalLB CRDs are installed.
# Managed by the "platform" AppProject.
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argoproj.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    namespace: metallb-system
    server: https://kubernetes.default.svc
  project: platform
  source:
    path: platform/metallb/config
    repoURL: https://github.com/adurrr/homelab-gitops-infra
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  ignoreDifferences:
    # === IPAddressPool ===
    # Real LAN IPs are set per-environment on the cluster.
    # Git holds placeholders (<METALLB_IP>-<METALLB_IP_END>) — never overwrite.
    - group: metallb.io
      kind: IPAddressPool
      name: homelab-pool
      jsonPointers:
        - /spec/addresses
    # === L2Advertisement ===
    # CRD-defaulted fields may drift; ignore entire spec to prevent noise.
    - group: metallb.io
      kind: L2Advertisement
      name: homelab-l2
      jsonPointers:
        - /spec
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
