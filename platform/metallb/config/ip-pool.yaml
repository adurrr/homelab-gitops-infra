# =============================================================================
# MetalLB: IP Address Pool & L2 Advertisement
# =============================================================================
# Adjust the IP range to match your LAN.
# These IPs will be assigned to LoadBalancer services.
#
# Usage: kubectl apply -f platform/metallb/ip-pool.yaml
# Or manage via ArgoCD in the platform project.

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb-system
spec:
  addresses:
    - <METALLB_IP>-<METALLB_IP_END>  # ADJUST to your LAN range
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - homelab-pool
