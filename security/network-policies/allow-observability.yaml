# =============================================================================
# Allow: Observability Namespace (monitoring)
# =============================================================================
# Allows ingress from: Traefik (Grafana UI), all namespaces (Prometheus scrapes),
#   kube-system (Prometheus scrapes K8s components), internal (OTel→Loki etc.)
# =============================================================================

---
# Allow Prometheus to scrape targets in all namespaces
# Prometheus initiates scrape connections, so this allows the RETURN traffic
# from scraped pods back to Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-from-all
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9090
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9093
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3100

---
# Allow Traefik ingress to Grafana
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-from-traefik
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 3000

---
# Allow internal monitoring communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-internal
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9090    # Prometheus
        - protocol: TCP
          port: 9093    # Alertmanager
        - protocol: TCP
          port: 3000    # Grafana
        - protocol: TCP
          port: 3100    # Loki
        - protocol: TCP
          port: 4317    # OTel gRPC
        - protocol: TCP
          port: 4318    # OTel HTTP
        - protocol: TCP
          port: 13133   # OTel health
        - protocol: TCP
          port: 7946    # Loki memberlist
        - protocol: TCP
          port: 9095    # Loki GRPC
        - protocol: TCP
          port: 8080    # Prometheus operator
        - protocol: TCP
          port: 9100    # node-exporter

---
# Allow kube-system to send metrics to monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-from-kube-system
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
